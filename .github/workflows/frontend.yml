name: Frontend CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'   # always latest stable

      - name: Install Dependencies
        run: npm ci   # faster & better than npm install

      - name: Build Project
        run: npm run build

      - name: Run Tests
        run: npm test --if-present
