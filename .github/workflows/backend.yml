name: Backend CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: |
          cd $(find . -name "pom.xml" -exec dirname {} \; | head -n 1)
          mvn clean package

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user
            rm -rf app
            git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git app
            cd app
            cd $(find . -name "pom.xml" -exec dirname {} \; | head -n 1)
            mvn clean package
            pkill -f java || true
            nohup java -jar target/*.jar > app.log 2>&1 &
