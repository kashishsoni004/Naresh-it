name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
    branches:
      - main

  pull_request:
    paths:
      - 'backend/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: mvn clean install

      - name: Run Tests
        run: mvn test
