name: Backend CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # optional (warning avoid)

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project
        run: mvn clean install

      - name: Run Tests
        run: mvn test
