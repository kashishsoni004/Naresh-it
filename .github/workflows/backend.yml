name: Backend CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted   # 🔥 EC2 pe run hoga

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Project
        run: |
          cd backend
          mvn clean package

      - name: Run App
        run: |
          pkill -f java || true
          nohup java -jar backend/target/*.jar > app.log 2>&1 &
