name: Flask Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ── Job 1: Test ───────────────────────────────────────────────────────────────
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      SERP_API_KEY: ${{ secrets.SERP_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check app imports (smoke test)
        run: |
          python -c "from app import create_app; app = create_app(); print('✅ App created successfully')"

  # ── Job 2: Deploy (runs only on push to main) ─────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT }}
          script: |
            cd /home/${{ secrets.SSH_USER }}/app          # change to your app path
            git pull origin main

            # Write .env file from GitHub Secrets
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
            echo "SERP_API_KEY=${{ secrets.SERP_API_KEY }}" >> .env

            # Install / update dependencies
            pip install -r requirements.txt

            # Restart the app (adjust command to match your setup)
            sudo systemctl restart flask-app
            # --- OR if using gunicorn process: ---
            # pkill gunicorn || true
            # nohup gunicorn -w 4 -b 0.0.0.0:5000 app:app &
